<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Distribution System</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-badge">🔐 SECURE ACCESS</div>
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Login to continue shopping</p>

      <div class="error-message" id="error-message"></div>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary auth-btn">Login</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { loginUser } from './js/auth.js';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-message');

      errorMsg.style.display = 'none';

      if (!username || !password) {
        errorMsg.textContent = 'Please fill all fields';
        errorMsg.style.display = 'block';
        return;
      }

      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const success = await loginUser(username, password);

      if (!success) {
        errorMsg.textContent = 'Invalid username or password';
        errorMsg.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Login';
    });
  </script>
</body>

</html>

services:
  - type: web
    name: distribution-system-api
    runtime: python
    rootDir: backend
    repo: https://github.com/MAMU456/Dist-sysFullstack.git
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: distribution-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: postgresql
    name: distribution-db
    ipAllowList: [] # only allow internal connections
    plan: free

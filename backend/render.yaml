services:
  - type: web
    name: distribution-system-api
    runtime: python
    repo: https://github.com/YOUR_USERNAME/distribution-system
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: distribution-db
          property: connectionString

  - type: postgresql
    name: distribution-db
    ipAllowList: [] # only allow internal connections
    plan: free
